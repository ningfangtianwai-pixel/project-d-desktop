name: Quality Gate

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/verify-asset-ledger.cjs check
      - run: node scripts/verify-asset-ledger.cjs report
      - name: Enforce commercial asset evidence on release tags
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
        run: node scripts/verify-asset-ledger.cjs check --commercial
      - run: node scripts/qa-release-lifecycle.cjs --mode fixture
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - run: node scripts/generate-supply-chain-evidence.cjs --audit-level high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/projectd-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: projectd-quality-evidence
          path: |
            artifacts/projectd-sbom.cdx.json
            artifacts/security/*.json
            artifacts/asset-ledger-report.json
            artifacts/qa/release-lifecycle-*/report.json
