appId: com.projectd.app
productName: Project D
copyright: Copyright © 2026

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - assets/**/*
  - resources/**/*
  - package.json

asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm

extraResources:
  - from: assets/
    to: assets/
  - from: resources/
    to: resources/

publish:
  - provider: generic
    url: https://updates.projectd.invalid/releases
    channel: latest

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/app-icon.png
  artifactName: ProjectD-${version}-Setup.${ext}

nsis:
  include: resources/installer.nsh
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
