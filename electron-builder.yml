appId: com.projectd.app
productName: Project D
copyright: Copyright © 2026

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - assets/**/*
  - resources/**/*
  - package.json

asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm

extraResources:
  - from: assets/
    to: assets/
  - from: resources/
    to: resources/

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/app-icon.png
  artifactName: ProjectD-${version}-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/app-icon.png
  category: public.app-category.utilities
  artifactName: ProjectD-${version}.${ext}

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/app-icon.png
